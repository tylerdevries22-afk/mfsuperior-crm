name: cron · tick-sequences

# Replaces the Pro-only Vercel Cron. Hits the existing
# /api/cron/tick-sequences route with the same Bearer auth Vercel Cron
# would use, so the route handler doesn't have to know who called it.
#
# GitHub-hosted cron is best-effort — runs may slip by a few minutes
# under load. That's acceptable for the tick engine; idempotency in
# tick.ts means a delayed or doubled fire doesn't double-send.

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes
  workflow_dispatch:           # manual trigger from the Actions tab

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: POST /api/cron/tick-sequences
        env:
          APP_URL: ${{ vars.APP_URL || 'https://www.mfsuperiorproducts.com' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET}" ]; then
            echo "::error::CRON_SECRET secret is missing on this repo (Settings → Secrets and variables → Actions → CRON_SECRET)"
            exit 1
          fi
          # Capture status + body separately so a non-2xx prints a useful
          # diagnostic instead of bare 'curl: (22) The requested URL returned
          # error 401'. We DON'T pass -f here so curl returns 0 on 4xx and
          # we can decide based on status.
          status=$(curl -sS -o /tmp/response.json -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL}/api/cron/tick-sequences")
          echo "HTTP $status"
          echo "Response body:"
          cat /tmp/response.json | head -c 4000
          echo
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "::error::tick-sequences returned HTTP $status"
            if [ "$status" = "401" ]; then
              echo "::error::Likely cause: CRON_SECRET in GitHub Actions doesn't match the value set in Vercel env. Sync them: vercel env ls → match the secret to Settings → Secrets and variables → Actions → CRON_SECRET."
            fi
            exit 1
          fi
