name: cron · sync-drive

on:
  schedule:
    - cron: "0 * * * *"     # top of every hour
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: POST /api/cron/sync-drive
        env:
          APP_URL: ${{ vars.APP_URL || 'https://www.mfsuperiorproducts.com' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET}" ]; then
            echo "::error::CRON_SECRET secret is missing on this repo"
            exit 1
          fi
          status=$(curl -sS -o /tmp/response.json -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL}/api/cron/sync-drive")
          echo "HTTP $status"
          echo "Response body:"
          cat /tmp/response.json | head -c 4000
          echo
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "::error::sync-drive returned HTTP $status"
            if [ "$status" = "401" ]; then
              echo "::error::CRON_SECRET mismatch between GitHub Actions and Vercel env."
            fi
            exit 1
          fi
