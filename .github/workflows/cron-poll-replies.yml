name: cron · poll-replies

on:
  schedule:
    - cron: "*/5 * * * *"    # every 5 minutes (GitHub's minimum)
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: POST /api/cron/poll-replies
        env:
          APP_URL: ${{ vars.APP_URL || 'https://www.mfsuperiorproducts.com' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET}" ]; then
            echo "::error::CRON_SECRET secret is missing on this repo"
            exit 1
          fi
          curl -fsS -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL}/api/cron/poll-replies" \
            -o /tmp/response.json
          echo "Response:"
          cat /tmp/response.json | head -c 4000
          echo
